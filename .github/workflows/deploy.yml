name: Deploy naar GitHub Pages

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Node.js instellen
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Dependencies installeren
        run: npm install

      - name: App bouwen
        run: npm run build

      - name: Deployen naar GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build