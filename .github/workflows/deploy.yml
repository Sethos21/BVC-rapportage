name: Deploy naar GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Node.js instellen
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Dependencies installeren
        run: npm install

      - name: App bouwen
        run: npm run build
        env:
          REACT_APP_WORKER_URL: ${{ vars.REACT_APP_WORKER_URL }}
      - name: Tool kopiëren naar build
        run: cp excel_tool.html build/excel_tool.html    

      - name: Deployen naar GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build